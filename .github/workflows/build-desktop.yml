name: Build & Deploy Desktop App

on:
  push:
    branches: [main]
    paths:
      - 'skypro-desktop/**'
      - '.github/workflows/build-desktop.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: skypro-desktop/package-lock.json

      - name: Install dependencies
        working-directory: skypro-desktop
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Build renderer + Electron package
        working-directory: skypro-desktop
        run: npm run build:desktop

      - name: Generate version.json
        working-directory: skypro-desktop
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          SETUP_FILE="SkyPro Setup ${VERSION}.exe"
          ENCODED_FILE="SkyPro%20Setup%20${VERSION}.exe"
          cat > dist/release/version.json <<VEOF
          {
            "version": "${VERSION}",
            "releaseDate": "${DATE}",
            "setupFile": "${SETUP_FILE}",
            "downloadUrl": "https://downloads.skywaveads.com/skypro/${ENCODED_FILE}"
          }
          VEOF
          echo "Generated version.json for v${VERSION}"

      - name: Deploy to server
        shell: bash
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 147.79.66.116 >> ~/.ssh/known_hosts 2>/dev/null
          SCP_OPTS="-o StrictHostKeyChecking=no -i ~/.ssh/deploy_key"
          DEST="root@147.79.66.116:/var/www/downloads.skywaveads.com/skypro/"
          cd skypro-desktop/dist/release
          scp $SCP_OPTS "SkyPro Setup"*.exe latest.yml *.blockmap version.json "$DEST"
          rm -f ~/.ssh/deploy_key

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-${{ github.sha }}
          path: |
            skypro-desktop/dist/release/SkyPro Setup *.exe
            skypro-desktop/dist/release/latest.yml
            skypro-desktop/dist/release/version.json
          retention-days: 30
