server {
    server_name skypro.skywaveads.com;
    client_max_body_size 1m;

    # Hide nginx version from responses / error pages
    server_tokens off;

    add_header X-Content-Type-Options 'nosniff' always;
    add_header X-Frame-Options 'DENY' always;
    add_header Referrer-Policy 'strict-origin-when-cross-origin' always;
    add_header Permissions-Policy 'camera=(), microphone=(), geolocation=()' always;
    # HSTS — forces HTTPS for a year and protects against SSL-stripping.
    # Safe here because every request to this server block is already TLS (listen 443 ssl).
    add_header Strict-Transport-Security 'max-age=31536000; includeSubDomains' always;

    location ^~ /api/auth/ {
        limit_req zone=skypro_auth burst=20 nodelay;
        include /etc/nginx/snippets/skypro-proxy.conf;
    }

    location ^~ /api/desktop/ {
        limit_req zone=skypro_auth burst=20 nodelay;
        include /etc/nginx/snippets/skypro-proxy.conf;
    }

    location ^~ /api/keys/ {
        limit_req zone=skypro_auth burst=20 nodelay;
        include /etc/nginx/snippets/skypro-proxy.conf;
    }

    location ^~ /api/ {
        limit_req zone=skypro_api burst=60 nodelay;
        include /etc/nginx/snippets/skypro-proxy.conf;
    }

    location / {
        include /etc/nginx/snippets/skypro-proxy.conf;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/skypro.skywaveads.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/skypro.skywaveads.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name skypro.skywaveads.com;
    return 301 https://$host$request_uri;
}
